name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  python:
    name: Python examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mcp

      - name: Run regression tests
        run: python -m unittest discover -s examples/python/file-search/tests -p "test_*.py"

      - name: Smoke test Python servers
        run: |
          set -euo pipefail

          smoke() {
            "$@" >/dev/null 2>&1 && return 0
            exit_code=$?
            if [ "$exit_code" -ne 124 ]; then
              return $exit_code
            fi
          }

          smoke timeout 5s python examples/python/file-search/server.py
          smoke timeout 5s python examples/python/web-scraper/server.py
          smoke timeout 5s python templates/python-minimal/server.py

  typescript:
    name: TypeScript examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install TypeScript dependencies
        run: |
          set -euo pipefail
          projects=(
            "examples/typescript/rest-api-wrapper"
            "examples/typescript/database-explorer"
            "templates/typescript-minimal"
          )

          for project in "${projects[@]}"; do
            npm install --prefix "$project" --package-lock=false
          done

      - name: Seed sample database
        working-directory: examples/typescript/database-explorer
        run: npx tsx src/seed.ts

      - name: Smoke test TypeScript servers
        run: |
          set -euo pipefail

          smoke() {
            "$@" >/dev/null 2>&1 && return 0
            exit_code=$?
            if [ "$exit_code" -ne 124 ]; then
              return $exit_code
            fi
          }

          smoke timeout 8s npm --prefix examples/typescript/rest-api-wrapper run start
          smoke env DB_PATH="$PWD/examples/typescript/database-explorer/sample.db" timeout 8s \
            npm --prefix examples/typescript/database-explorer run start
          smoke timeout 8s npm --prefix templates/typescript-minimal run start

  go:
    name: Go example
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Go example
        working-directory: examples/go/hello-server
        run: go build ./...

  rust:
    name: Rust example
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check Rust example
        working-directory: examples/rust/hello-server
        run: cargo check

  java:
    name: Java example
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Java example
        working-directory: examples/java/hello-server
        run: mvn -q -DskipTests package

  csharp:
    name: C# examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build C# examples
        run: |
          set -euo pipefail
          projects=(
            "examples/csharp/hello-server/HelloServer.csproj"
            "examples/csharp/rest-api-wrapper/HackerNewsServer.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet build "$project" -c Release
          done

  kotlin:
    name: Kotlin examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Build Kotlin examples
        run: |
          set -euo pipefail
          projects=(
            "examples/kotlin/hello-server"
            "examples/kotlin/rest-api-wrapper"
          )

          for project in "${projects[@]}"; do
            gradle -p "$project" build --no-daemon
          done
